<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Paperclip - Redirecting...</title>
    <script>
      // Single Page App routing for GitHub Pages
      // Redirects all 404s to index.html with the original path preserved
      var pathSegments = 1; // Number of path segments in base URL (/gh-pages/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegments).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegments).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
