<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JSON Formatter & Validator | Paperclip</title>
  <meta name="description" content="Free online JSON formatter and validator. Beautify, minify, and validate JSON. Fast, private, works offline. No ads." />
  <meta name="keywords" content="json formatter, json validator, json beautifier, online json tool" />
  <meta name="author" content="Paperclip" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://bigknoxy.github.io/paperclip-pages/tools/json-formatter/" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#06b6d4;--muted:#9aa7b2;--text:#e6eef3;--success:#22c55e;--error:#ef4444;color-scheme:dark}
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px 28px;display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
    .logo{font-weight:700;font-size:1.2em;color:var(--accent)}
    nav{display:flex;gap:16px}
    nav a{color:var(--muted);text-decoration:none;font-size:14px}
    nav a:hover{color:var(--text)}
    .container{max-width:1000px;margin:0 auto;padding:24px}
    h1{font-size:1.8em;margin:0 0 8px 0}
    .subtitle{color:var(--muted);margin-bottom:24px}
    .tool-box{background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:24px;margin-bottom:20px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:768px){.split{grid-template-columns:1fr}}
    label{display:block;margin-bottom:8px;color:var(--muted);font-size:14px}
    textarea{width:100%;min-height:300px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;color:var(--text);font-family:monospace;font-size:13px;resize:vertical}
    textarea:focus{outline:none;border-color:var(--accent)}
    .button-group{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
    button{padding:10px 20px;background:var(--accent);color:#012;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
    button:hover{opacity:.9}
    button.secondary{background:rgba(255,255,255,0.1);color:var(--text)}
    button.secondary:hover{background:rgba(255,255,255,0.15)}
    .status{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:14px}
    .status.success{background:rgba(34,197,94,.1);color:var(--success)}
    .status.error{background:rgba(239,68,68,.1);color:var(--error)}
    .stats{display:flex;gap:24px;margin-top:12px;color:var(--muted);font-size:13px}
    footer{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px;border-top:1px solid rgba(255,255,255,0.05);margin-top:40px}
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">← Paperclip</a>
    <nav>
      <a href="/">Home</a>
      <a href="/about.html">About</a>
      <a href="/demo">Demo</a>
    </nav>
  </header>

  <div class="container">
    <h1>JSON Formatter & Validator</h1>
    <p class="subtitle">Beautify, minify, and validate JSON. All processing happens in your browser.</p>

    <div class="tool-box">
      <div class="split">
        <div>
          <label for="input">Input JSON</label>
          <textarea id="input" placeholder="Paste your JSON here..." spellcheck="false"></textarea>
        </div>
        <div>
          <label for="output">Formatted Output</label>
          <textarea id="output" placeholder="Formatted JSON will appear here..." readonly></textarea>
        </div>
      </div>
      
      <div class="button-group">
        <button onclick="format()">Beautify</button>
        <button onclick="minify()">Minify</button>
        <button onclick="validate()">Validate</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
      </div>

      <div id="status"></div>
      <div class="stats" id="stats"></div>
    </div>
  </div>

  <footer>
    <p>Made with minimal code • Free forever • No tracking</p>
  </footer>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const stats = document.getElementById('stats');

    function showStatus(text, type) {
      status.textContent = text;
      status.className = 'status ' + type;
    }

    function updateStats(json) {
      if (!json) {
        stats.innerHTML = '';
        return;
      }
      try {
        const obj = JSON.parse(json);
        const size = new Blob([json]).size;
        const keys = Object.keys(obj).length;
        stats.innerHTML = `<span>Size: ${size} bytes</span><span>Keys: ${keys}</span>`;
      } catch (e) {
        stats.innerHTML = '';
      }
    }

    function format() {
      try {
        const text = input.value.trim();
        if (!text) {
          showStatus('Please enter some JSON', 'error');
          return;
        }
        const obj = JSON.parse(text);
        output.value = JSON.stringify(obj, null, 2);
        showStatus('JSON formatted successfully!', 'success');
        updateStats(output.value);
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, 'error');
      }
    }

    function minify() {
      try {
        const text = input.value.trim();
        if (!text) {
          showStatus('Please enter some JSON', 'error');
          return;
        }
        const obj = JSON.parse(text);
        output.value = JSON.stringify(obj);
        showStatus('JSON minified!', 'success');
        updateStats(output.value);
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, 'error');
      }
    }

    function validate() {
      try {
        const text = input.value.trim();
        if (!text) {
          showStatus('Please enter some JSON', 'error');
          return;
        }
        JSON.parse(text);
        showStatus('Valid JSON!', 'success');
        updateStats(text);
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, 'error');
      }
    }

    function clearAll() {
      input.value = '';
      output.value = '';
      status.textContent = '';
      status.className = '';
      stats.innerHTML = '';
    }

    // Auto-format on paste
    input.addEventListener('paste', function() {
      setTimeout(format, 100);
    });
  </script>
</body>
</html>
