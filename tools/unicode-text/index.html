<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Text Converter - Fancy Text Generator | Paperclip</title>
    <meta name="description" content="Free Unicode text converter. Transform text into bold, italic, monospace, script, and decorative Unicode styles. Perfect for social media.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e14; --card: #11181f; --surface: #1a232e; --accent: #f97316; --success: #22c55e; --text: #f8fafc; --text-muted: #94a3b8; --border: rgba(148,163,184,0.15); --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit',system-ui,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
        header { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .logo { font-weight: 700; font-size: 1.3em; color: var(--accent); text-decoration: none; }
        nav { display: flex; gap: 24px; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        nav a:hover { color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px 60px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 { font-size: clamp(2.5rem,5vw,4rem); font-weight: 700; margin-bottom: 16px; background: linear-gradient(135deg,var(--text) 0%,var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-muted); font-size: 1.1em; max-width: 600px; margin: 0 auto 32px; }
        .input-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
        textarea { width: 100%; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; min-height: 100px; }
        textarea:focus { outline: none; border-color: var(--accent); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--accent); color: white; margin-top: 16px; }
        .btn:hover { background: #ea580c; }
        .styles-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 16px; }
        .style-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; }
        .style-card:hover { border-color: var(--accent); }
        .style-card.copied { border-color: var(--success); }
        .style-name { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
        .style-preview { font-size: 18px; word-break: break-word; }
        footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; border-top: 1px solid var(--border); margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Paperclip</a>
        <nav><a href="/">Home</a><a href="/tools/">Tools</a></nav>
    </header>
    <div class="container">
        <div class="hero">
            <h1>Unicode Text Converter</h1>
            <p>Transform your text into fancy Unicode styles instantly. Perfect for social media, gaming, and creative designs.</p>
        </div>
        <div class="input-section">
            <textarea id="inputText" placeholder="Type something here...">Hello World</textarea>
            <button class="btn" id="copyAllBtn">Copy All Styles</button>
        </div>
        <div class="styles-grid" id="stylesGrid"></div>
    </div>
    <footer>
        <p>Built with love by <a href="https://github.com/bigknoxy/paperclip-pages" target="_blank">Paperclip</a></p>
    </footer>
    <script>
        const latin = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        const styles = [
            { name: 'Bold', chars: 'ЁЭЧФЁЭЧХЁЭЧЦЁЭЧЧЁЭЧШЁЭЧЩЁЭЧЪЁЭЧЫЁЭЧЬЁЭЧЭЁЭЧЮЁЭЧЯЁЭЧаЁЭЧбЁЭЧвЁЭЧгЁЭЧдЁЭЧеЁЭЧжЁЭЧзЁЭЧиЁЭЧйЁЭЧкЁЭЧлЁЭЧмЁЭЧнЁЭЧоЁЭЧпЁЭЧ░ЁЭЧ▒ЁЭЧ▓ЁЭЧ│ЁЭЧ┤ЁЭЧ╡ЁЭЧ╢ЁЭЧ╖ЁЭЧ╕ЁЭЧ╣ЁЭЧ║ЁЭЧ╗ЁЭЧ╝ЁЭЧ╜ЁЭЧ╛ЁЭЧ┐ЁЭШАЁЭШБЁЭШВЁЭШГЁЭШДЁЭШЕЁЭШЖЁЭШЗЁЭЯмЁЭЯнЁЭЯоЁЭЯпЁЭЯ░ЁЭЯ▒ЁЭЯ▓ЁЭЯ│ЁЭЯ┤ЁЭЯ╡' },
            { name: 'Italic', chars: 'ЁЭШИЁЭШЙЁЭШКЁЭШЛЁЭШМЁЭШНЁЭШОЁЭШПЁЭШРЁЭШСЁЭШТЁЭШУЁЭШФЁЭШХЁЭШЦЁЭШЧЁЭШШЁЭШЩЁЭШЪЁЭШЫЁЭШЬЁЭШЭЁЭШЮЁЭШЯЁЭШаЁЭШбЁЭШвЁЭШдЁЭШеЁЭШжЁЭШзЁЭШиЁЭШйЁЭШкЁЭШлЁЭШмЁЭШнЁЭШоЁЭШпЁЭШ░ЁЭШ▒ЁЭШ▓ЁЭШ│ЁЭШ┤ЁЭШ╡ЁЭШ╢ЁЭШ╖ЁЭШ╕ЁЭШ╣ЁЭШ║ЁЭШ╗0123456789' },
            { name: 'Bold Italic', chars: 'ЁЭШ╝ЁЭШ╜ЁЭШ╛ЁЭШ┐ЁЭЩАЁЭЩБЁЭЩВЁЭЩГЁЭЩДЁЭЩЕЁЭЩЖЁЭЩЗЁЭЩИЁЭЩЙЁЭЩКЁЭЩЛЁЭЩМЁЭЩНЁЭЩОЁЭЩПЁЭЩРЁЭЩСЁЭЩТЁЭЩУЁЭЩФЁЭЩХЁЭЩЦЁЭЩЧЁЭЩШЁЭЩЩЁЭЩЪЁЭЩЫЁЭЩЬЁЭЩЭЁЭЩЮЁЭЩЯЁЭЩаЁЭЩбЁЭЩвЁЭЩгЁЭЩдЁЭЩеЁЭЩжЁЭЩзЁЭЩиЁЭЩйЁЭЩкЁЭЩлЁЭЩмЁЭЩнЁЭЩоЁЭЩпЁЭЯОЁЭЯПЁЭЯРЁЭЯСЁЭЯТЁЭЯУЁЭЯФЁЭЯХЁЭЯЦЁЭЯЧ' },
            { name: 'Monospace', chars: 'ЁЭЩ░ЁЭЩ▒ЁЭЩ▓ЁЭЩ│ЁЭЩ┤ЁЭЩ╡ЁЭЩ╢ЁЭЩ╖ЁЭЩ╕ЁЭЩ╣ЁЭЩ║ЁЭЩ╗ЁЭЩ╝ЁЭЩ╜ЁЭЩ╛ЁЭЩ┐ЁЭЪАЁЭЪБЁЭЪВЁЭЪГЁЭЪДЁЭЪЕЁЭЪЖЁЭЪЗЁЭЪИЁЭЪЙЁЭЪКЁЭЪЛЁЭЪМЁЭЪНЁЭЪОЁЭЪПЁЭЪРЁЭЪСЁЭЪТЁЭЪУЁЭЪФЁЭЪХЁЭЪЦЁЭЪЧЁЭЪШЁЭЪЩЁЭЪЪЁЭЪЫЁЭЪЬЁЭЪЭЁЭЪЮЁЭЪЯЁЭЪаЁЭЪбЁЭЪвЁЭЪгЁЭЯ╢ЁЭЯ╖ЁЭЯ╕ЁЭЯ╣ЁЭЯ║ЁЭЯ╗ЁЭЯ╝ЁЭЯ╜ЁЭЯ╛ЁЭЯ┐' },
            { name: 'Script', chars: 'ЁЭТЬтДмЁЭТЮЁЭТЯтД░тД▒ЁЭТвтДЛтДРЁЭТеЁЭТжтДТтД│ЁЭТйЁЭТкЁЭТлЁЭТмтДЫЁЭТоЁЭТпЁЭТ░ЁЭТ▒ЁЭТ▓ЁЭТ│ЁЭТ┤ЁЭТ╡ЁЭТ╢ЁЭТ╖ЁЭТ╕ЁЭТ╣тДпЁЭТ╗тДКЁЭТ╜ЁЭТ╛ЁЭТ┐ЁЭУАЁЭУБЁЭУВЁЭУГтД┤ЁЭУЕЁЭУЖЁЭУЗЁЭУИЁЭУЙЁЭУКЁЭУЛЁЭУМЁЭУНЁЭУОЁЭУП0123456789' },
            { name: 'Double-Struck', chars: 'ЁЭФ╕ЁЭФ╣тДВЁЭФ╗ЁЭФ╝ЁЭФ╜ЁЭФ╛тДНЁЭХАЁЭХБЁЭХВЁЭХГЁЭХДтДХЁЭХЖтДЩтДЪтДЭЁЭХКЁЭХЛЁЭХМЁЭХНЁЭХОЁЭХПЁЭХРтДдЁЭХТЁЭХУЁЭХФЁЭХХЁЭХЦЁЭХЧЁЭХШЁЭХЩЁЭХЪЁЭХЫЁЭХЬЁЭХЭЁЭХЮЁЭХЯЁЭХаЁЭХбЁЭХвЁЭХгЁЭХдЁЭХеЁЭХжЁЭХзЁЭХиЁЭХйЁЭХкЁЭХлЁЭЯШЁЭЯЩЁЭЯЪЁЭЯЫЁЭЯЬЁЭЯЭЁЭЯЮЁЭЯЯЁЭЯаЁЭЯб' },
            { name: 'Circled', chars: 'тТ╢тТ╖тТ╕тТ╣тТ║тТ╗тТ╝тТ╜тТ╛тТ┐тУАтУБтУВтУГтУДтУЕтУЖтУЗтУИтУЙтУКтУЛтУМтУНтУОтУПтУРтУСтУТтУУтУФтУХтУЦтУЧтУШтУЩтУЪтУЫтУЬтУЭтУЮтУЯтУатУбтУвтУгтУдтУетУжтУзтУитУйтСатСбтСвтСгтСдтСетСжтСзтСитУк' },
            { name: 'Squared', chars: 'ЁЯД░ЁЯД▒ЁЯД▓ЁЯД│ЁЯД┤ЁЯД╡ЁЯД╢ЁЯД╖ЁЯД╕ЁЯД╣ЁЯД║ЁЯД╗ЁЯД╝ЁЯД╜ЁЯД╛ЁЯД┐ЁЯЕАЁЯЕБЁЯЕВЁЯЕГЁЯЕДЁЯЕЕЁЯЕЖЁЯЕЗЁЯЕИЁЯЕЙЁЯЕ░ЁЯЕ▒ЁЯЕ▓ЁЯЕ│ЁЯЕ┤ЁЯЕ╡ЁЯЕ╢ЁЯЕ╖ЁЯЕ╕ЁЯЕ╣ЁЯЕ║ЁЯЕ╗ЁЯЕ╝ЁЯЕ╜ЁЯЕ╛ЁЯЕ┐ЁЯЖАЁЯЖБЁЯЖВЁЯЖГЁЯЖДЁЯЖЕЁЯЖЖЁЯЖЗЁЯЖИЁЯЖЙ1234567890' }
        ];
        function convert(text, styleChars) {
            let result = '';
            for (let char of text) {
                const idx = latin.indexOf(char);
                result += idx >= 0 ? styleChars[idx] : char;
            }
            return result;
        }
        function render() {
            const text = document.getElementById('inputText').value || 'Hello World';
            const grid = document.getElementById('stylesGrid');
            grid.innerHTML = styles.map(s => {
                const converted = convert(text, s.chars);
                return '<div class="style-card" data-text="' + converted + '"><div class="style-name">' + s.name + '</div><div class="style-preview">' + converted + '</div></div>';
            }).join('');
            document.querySelectorAll('.style-card').forEach(card => {
                card.addEventListener('click', () => {
                    navigator.clipboard.writeText(card.dataset.text);
                    card.classList.add('copied');
                    setTimeout(() => card.classList.remove('copied'), 1000);
                });
            });
        }
        document.getElementById('inputText').addEventListener('input', render);
        document.getElementById('copyAllBtn').addEventListener('click', () => {
            const text = document.getElementById('inputText').value || 'Hello World';
            const all = styles.map(s => s.name + ': ' + convert(text, s.chars)).join('\n');
            navigator.clipboard.writeText(all);
            alert('All styles copied!');
        });
        render();
    </script>
</body>
</html>
